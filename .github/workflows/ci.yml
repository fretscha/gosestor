name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        run: go test -race -count=1 ./...

  # Proves the plugin still compiles into a real Caddy binary and that both
  # modules register — the failure mode `go test` alone cannot catch.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
      - name: Build Caddy with gosestor
        run: xcaddy build --with github.com/fretscha/gosestor=. --output ./caddy
      - name: Verify modules registered
        run: |
          ./caddy list-modules | grep -x 'http.handlers.session_store'
          ./caddy list-modules | grep -x 'admin.api.gosestor'
